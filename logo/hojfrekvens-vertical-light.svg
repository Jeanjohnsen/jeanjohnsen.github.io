<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 148" role="img" aria-label="Høj Frekvens">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c6af5"/>
    </linearGradient>
  </defs>

  <!-- Ikon-boks, centreret -->
  <rect x="10" y="0" width="100" height="100" rx="22" fill="#0f1117"/>
  <!-- 3 bølgecykler -->
  <path d="M18,50 C23,36 27,36 32,50 C37,64 41,64 46,50 C51,36 55,36 60,50 C65,64 69,64 74,50 C79,36 83,36 88,50 C93,64 97,64 102,50"
        fill="none" stroke="url(#g)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- "Høj" -->
  <text x="60" y="120"
        text-anchor="middle"
        font-family="Satoshi, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="700"
        font-size="22"
        fill="#1a1b26">Høj</text>

  <!-- "Frekvens" -->
  <text x="60" y="142"
        text-anchor="middle"
        font-family="Satoshi, ui-sans-serif, system-ui, -apple-system, sans-serif"
